<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* الناف بار بقى للوجو بس */
        nav {
            width: 100%;
            padding: 20px 5%;
            position: fixed;
            top: 0;
            display: flex;
            justify-content: flex-start;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
        }

        .content {
            margin-top: 20vh;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 10px;
        }

        h1 span { color: #f1d37e; }

        p {
            color: #a0a0a0;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        /* المجموعة اللي طلبتها تحت بعض بالظبط */
        .fixed-btn-group {
            position: fixed;
            top: 65%; /* عدل الرقم ده عشان ترفعهم أو تنزلهم */
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            width: 220px;
            transition: 0.3s;
        }

        /* الزرار الأساسي أصفر */
        .btn-main {
            background-color: #f1d37e;
            color: black;
        }

        /* الأزرار التانية اللي نزلت من فوق (شفافة ببرواز أصفر) */
        .btn-sub {
            background-color: transparent;
            color: #f1d37e;
            border: 1px solid #f1d37e;
        }

        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MEGA PRO</a>
    </nav>

    <div class="content">
        <h1>Empowering Brands <br> Through <span>Software</span></h1>
        <p>High-end digital solutions that drive growth.</p>
    </div>

    <!-- التلاتة تحت بعض في السنتر -->
    <div class="fixed-btn-group">
        <a href="start.html" class="btn btn-main">Start Your Project</a>
        <a href="#services" class="btn btn-sub">Services</a>
        <a href="about.html" class="btn btn-sub">About</a>
    </div>

</body>
</html>
