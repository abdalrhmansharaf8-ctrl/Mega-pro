<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Pro | Dev Layout</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://unpkg.com" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-gradient: linear-gradient(45deg, #d4af37, #f1d37e);
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Center Content */
        .hero-header { text-align: center; margin-bottom: 40px; z-index: 10; }
        
        .hero-header h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            line-height: 1;
        }

        .hero-header h1 span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* الأزرار اللي تحت بعض */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
            z-index: 10;
        }

        .btn-stack-item {
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            transition: 0.4s;
        }

        /* تمييز زرار البداية */
        .btn-main {
            background: var(--gold-gradient);
            color: #000;
            border: none;
        }

        .btn-stack-item:hover {
            transform: scale(1.05);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* عناصر زينة (Artistic Corners) */
        .corner-tag {
            position: absolute;
            font-size: 0.7rem;
            color: var(--gold);
            opacity: 0.5;
            letter-spacing: 3px;
        }
        .top-l { top: 40px; left: 40px; }
        .bottom-r { bottom: 40px; right: 40px; }

        /* Glow Effect */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--gold);
            filter: blur(150px);
            opacity: 0.05;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="glow"></div>
        
        <div class="corner-tag top-l">MEGA_PRO // SYSTEM_V1</div>
        <div class="corner-tag bottom-r">CORE_STATION_2026</div>

        <div class="hero-header">
            <h1 data-aos="fade-down">MEGA<br><span>PRO</span></h1>
        </div>

        <!-- الأزرار المطلوبة تحت بعض -->
        <div class="button-stack">
            <a href="#services" class="btn-stack-item" data-aos="fade-up" data-aos-delay="100">
                <i class="fas fa-layer-group"></i> &nbsp; Our Services
            </a>
            <a href="about.html" class="btn-stack-item" data-aos="fade-up" data-aos-delay="200">
                <i class="fas fa-user-astronaut"></i> &nbsp; About Us
            </a>
            <a href="start.html" class="btn-stack-item btn-main" data-aos="fade-up" data-aos-delay="300">
                Start Your Project
            </a>
        </div>
    </section>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
