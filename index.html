<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Boxes</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial;
}

/* الكارد الكبير */
.container {
    background: #ddd;
    padding: 20px;
    border-radius: 15px;
    width: 95%;
    max-width: 700px;
}

/* الجريد */
.grid {
    display: grid;
    gap: 10px;
}

/* الصف الأول */
.top {
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
}

/* الصف التاني */
.bottom {
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
}

/* شكل البوكس */
.box {
    background: linear-gradient(#ccc, #aaa);
    border-radius: 10px;
    height: 80px;
}

/* بوكس طويل */
.big {
    grid-row: span 2;
    height: 170px;
}

/* موبايل */
@media(max-width:500px){
    .box {
        height: 70px;
    }

    .big {
        height: 150px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- الصف الأول -->
    <div class="grid top">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <br>

    <!-- الصف التاني -->
    <div class="grid bottom">
        <div class="box big"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

</div>

</body>
</html>
