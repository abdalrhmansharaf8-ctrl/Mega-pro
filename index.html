<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Layout</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* الكارد */
.container {
    background: #ddd;
    padding: 20px;
    border-radius: 15px;
    width: 95%;
    max-width: 700px;
}

/* الجريد الأساسي */
.grid {
    display: grid;
    gap: 10px;

    grid-template-columns: repeat(4, 1fr);
    grid-template-areas:
        "a b c d"
        "e f g h"
        "e i j k";
}

/* البوكس */
.box {
    background: linear-gradient(#ccc, #aaa);
    border-radius: 10px;
    height: 80px;
}

/* توزيع العناصر */
.a { grid-area: a; }
.b { grid-area: b; }
.c { grid-area: c; }
.d { grid-area: d; }

.e { grid-area: e; height: 170px; }

.f { grid-area: f; }
.g { grid-area: g; }
.h { grid-area: h; }

.i { grid-area: i; }
.j { grid-area: j; }
.k { grid-area: k; }

/* 📱 موبايل */
@media(max-width: 600px){

    .grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-areas:
            "a b"
            "c d"
            "e e"
            "f g"
            "h i"
            "j k";
    }

    .e {
        height: 120px;
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="grid">
        <div class="box a"></div>
        <div class="box b"></div>
        <div class="box c"></div>
        <div class="box d"></div>

        <div class="box e"></div>

        <div class="box f"></div>
        <div class="box g"></div>
        <div class="box h"></div>

        <div class="box i"></div>
        <div class="box j"></div>
        <div class="box k"></div>
    </div>
</div>

</body>
</html>
