<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Pro</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        h1 span {
            color: #f1d37e;
        }

        p {
            color: #a0a0a0;
            max-width: 500px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* حاوية الأزرار في نفس المكان */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* المسافة بين الأزرار */
        }

        .btn {
            background-color: #f1d37e;
            color: black;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            width: 200px; /* توحيد عرض الأزرار */
        }

        /* لو عاوز تخلي About و Services بلون مختلف شوية */
        .btn-alt {
            background-color: transparent;
            border: 1px solid #f1d37e;
            color: #f1d37e;
        }
    </style>
</head>
<body>

    <h1>Empowering Brands <br> Through <span>Software</span></h1>
    <p>We specialize in delivering high-end digital solutions that drive growth and innovation.</p>

    <div class="btn-container">
        <a href="#" class="btn">About</a>
        <a href="#" class="btn">Services</a>
        <a href="#" class="btn">Start Your Project</a>
    </div>

</body>
</html>
