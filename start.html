<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Service | Mega Pro</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- AOS Library for Animations -->
    <link href="https://unpkg.com" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-gradient: linear-gradient(45deg, #d4af37, #f1d37e);
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* مسافة أمان عشان الموبايل */
        }

        .form-card {
            background: var(--card-bg);
            padding: clamp(25px, 5vw, 40px); /* Padding مرن */
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            font-size: clamp(1.6rem, 5vw, 2.2rem); /* خط مرن للعنوان */
            margin-bottom: 10px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle {
            color: #777;
            margin-bottom: 30px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #1d1d1d;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
            appearance: none; /* عشان شكل الـ Select في الأيفون */
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            background: #252525;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .submit-btn {
            background: var(--gold-gradient);
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .back-home {
            display: inline-block;
            margin-top: 25px;
            color: #777;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .back-home:hover { color: var(--gold); }

        /* تعديلات الموبايل الصغيرة جداً */
        @media (max-width: 380px) {
            .form-card { padding: 20px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="form-card" data-aos="zoom-in">
        <h2>Submit Your Order</h2>
        <p class="subtitle">Enter your details and we will contact you via email.</p>

        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="2ee02f39-250c-4a40-8e8c-0d97af2c097e">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            
            <select name="service">
                <option value="Front-end Development">Front-end Development</option>
                <option value="UI/UX Design">UI/UX Design</option>
                <option value="Full Website Project">Full Website Build</option>
            </select>
            
            <textarea name="message" rows="4" placeholder="Briefly describe your project..." required></textarea>

            <!-- التوجيه لصفحة النجاح (يفضل تعمل صفحة success.html) -->
            <input type="hidden" name="redirect" value="https://web3forms.com">

            <button type="submit" class="submit-btn">
                Submit Request <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
